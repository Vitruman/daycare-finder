<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48">
  <!-- Иконка домика в зелёном квадрате -->
  <rect x="0" y="4" width="40" height="40" rx="9" fill="#065f46"/>
  <!-- Крыша -->
  <polygon points="20,9 8,19 32,19" fill="white"/>
  <!-- Стены -->
  <rect x="10" y="19" width="20" height="16" rx="1" fill="white" opacity="0.95"/>
  <!-- Дверь -->
  <rect x="16" y="26" width="8" height="9" rx="2" fill="#065f46"/>

  <!-- Текст DaycareHub -->
  <text x="48" y="22" font-family="Inter, -apple-system, sans-serif" font-size="15" font-weight="800" fill="#111827" letter-spacing="-0.3">DaycareHub</text>
  <!-- Подпись -->
  <text x="48" y="35" font-family="Inter, -apple-system, sans-serif" font-size="9.5" font-weight="500" fill="#6b7280" letter-spacing="0.2">Find Licensed Childcare</text>
</svg>